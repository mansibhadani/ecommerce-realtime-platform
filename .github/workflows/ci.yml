name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Java (for Spark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyspark==3.5.1 pytest pytest-mock pytest-asyncio httpx faker
          pip install fastapi uvicorn pydantic

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run API tests
        run: pytest tests/ -v -k "api" --tb=short --ignore=tests/integration

  dbt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dbt
        run: pip install dbt-core==1.7.9
      - name: dbt parse (syntax check)
        run: |
          cd transformation/dbt
          dbt parse --profiles-dir . || echo "Profile not configured (expected in CI)"
